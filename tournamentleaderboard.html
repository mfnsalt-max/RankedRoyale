<script src="theme.js"></script>
<script>
// Generate 1000 filler players
const players = [];
for (let i = 1; i <= 1000; i++) {
  players.push({
    name: `Player${i}`,
    elo: Math.floor(Math.random() * 1000) + 1000 // random ELO 1000-2000
  });
}

// Insert "You" at a placeholder ELO (example 1580)
players.push({ name: "You", elo: 1988 });

// Sort players by ELO descending
players.sort((a, b) => b.elo - a.elo);

// Render table
const tbody = document.querySelector("#leaderboard-table tbody");
players.forEach((player, index) => {
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${index + 1}</td><td>${player.name}</td><td>${player.elo}</td>`;
  if (player.name === "You") {
    tr.style.fontWeight = "700";
    tr.style.color = "#f6c73b"; // highlight your row
  }
  tbody.appendChild(tr);
});
</script>

<script>
const dropdownToggle = document.querySelector('.dropdown-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

dropdownToggle.addEventListener('click', function(e) {
  e.preventDefault();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

window.addEventListener('click', function(e) {
  if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
    dropdownMenu.style.display = 'none';
  }
});
</script>
