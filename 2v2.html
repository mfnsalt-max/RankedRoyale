<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
  <script>
    // 1. Notification Logic specifically for this page to ensure it works
    async function checkNotifications() {
      const supabaseUrl = 'https://bxhxfsfpzbluevvimvyy.supabase.co';
      const supabaseKey = 'sb_publishable_POfMVVd3io00nMXGlRc2eQ_jndDE2oj';
      
      if (window.supabase) {
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const { data: { user } } = await supabase.auth.getUser();
        
        if (user) {
          // Check friendships table for pending requests where you are the receiver
          const { data, error } = await supabase
            .from('friendships')
            .select('id')
            .eq('receiver_id', user.id)
            .eq('status', 'pending');

          const dot = document.getElementById('friend-notification');
          if (dot) {
            dot.style.display = (data && data.length > 0) ? 'block' : 'none';
          }
        }
      }
    }

    // 2. Dropdown toggle logic
    const toggle = document.querySelector('.dropdown-toggle');
    const menu = document.querySelector('.dropdown-menu');
    if(toggle && menu) {
      toggle.addEventListener('click', e => {
        e.preventDefault();
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
      });
      window.addEventListener('click', e => {
        if (!toggle.contains(e.target) && !menu.contains(e.target)) {
          menu.style.display = 'none';
        }
      });
    }

    // Run notification check on load
    document.addEventListener('DOMContentLoaded', checkNotifications);
  </script>
