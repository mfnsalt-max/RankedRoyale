  <main style="display: flex; justify-content: center; align-items: center; height: 80vh; position: relative;">
    <button id="tiltButton" class="btn-primary" style="font-size: 3rem; padding: 60px 120px; border-radius: 20px; cursor: pointer;">
      TILT
    </button>

    <div id="cooldownOverlay" style="
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      color: white;
      font-size: 2rem;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    ">
      <p>You are tilted.</p>
      <p>Cooldown ends in <span id="timer">30:00</span></p>
    </div>
  </main>

  <footer style="text-align:center; color: var(--muted); margin-top:60px;">

  </footer>
  
  <script src="theme.js"></script>
  <script>
    const tiltButton = document.getElementById('tiltButton');
    const overlay = document.getElementById('cooldownOverlay');
    const timerDisplay = document.getElementById('timer');
    const STORAGE_KEY = 'tiltCooldownEnd';
    let cooldownInterval = null;

    function startCooldown(remainingSeconds) {
      overlay.style.display = 'flex';
      tiltButton.disabled = true;

      clearInterval(cooldownInterval);
      let timeLeft = remainingSeconds;

      cooldownInterval = setInterval(() => {
        if(timeLeft <= 0){
          clearInterval(cooldownInterval);
          overlay.style.display = 'none';
          tiltButton.disabled = false;
          localStorage.removeItem(STORAGE_KEY);
          return;
        }
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        timeLeft--;
      }, 1000);
    }

    function enforceTiltLock() {
      const savedEnd = localStorage.getItem(STORAGE_KEY);
      const now = Math.floor(Date.now() / 1000);
      if(savedEnd && savedEnd > now){
        const remaining = savedEnd - now;
        startCooldown(remaining);
        // Keep redirecting to tilt page if user tries to leave
        if(window.location.pathname !== '/tilt.html') {
          window.location.href = 'tilt.html';
        }
      }
    }

    tiltButton.addEventListener('click', () => {
      const duration = 30 * 60; // 30 minutes
      const endTime = Math.floor(Date.now() / 1000) + duration;
      localStorage.setItem(STORAGE_KEY, endTime);
      startCooldown(duration);
    });

    // Enforce lock on page load
    enforceTiltLock();

    // Also periodically enforce lock in case user navigates away and comes back
    setInterval(enforceTiltLock, 1000);

    // Optional: prevent right-click or navigation shortcuts
    window.addEventListener('beforeunload', function (e) {
      const savedEnd = localStorage.getItem(STORAGE_KEY);
      if(savedEnd && savedEnd > Math.floor(Date.now()/1000)){
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
