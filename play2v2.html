<style>
  body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
    transition: var(--transition);
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    padding: 40px 20px;
  }

  .team-section {
    display: flex;
    gap: 20px;
    justify-content: center;
    opacity: 0;
    transition: all 0.8s ease;
  }

  .player {
    transform: translateX(-100%);
  }

  .opponent {
    transform: translateX(100%);
  }

  .team-section.active {
    transform: translateX(0);
    opacity: 1;
  }

  .profile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    padding: 12px 16px;
    border-radius: var(--radius);
    min-width: 160px;
  }

  .profile-name {
    font-weight: bold;
    font-size: 1rem;
  }

  .badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-weight: bold;
    font-size: 0.85rem;
  }

  .start-btn {
    padding: 14px 28px;
    font-size: 1.2rem;
    background: var(--accent);
    color: var(--surface);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
  }

  .start-btn:hover {
    opacity: 0.9;
  }

  h1 {
    text-align: center;
  }
</style>
</head>

<script src="theme.js"></script>
<script>
  // Dropdown toggle
  const toggle = document.querySelector('.dropdown-toggle');
  const menu = document.querySelector('.dropdown-menu');
  toggle.addEventListener('click', e => {
    e.preventDefault();
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  });
  window.addEventListener('click', e => {
    if (!toggle.contains(e.target) && !menu.contains(e.target)) menu.style.display = 'none';
  });

  // Slide-in animation
  window.addEventListener('load', () => {
    document.getElementById('players').classList.add('active');
    document.getElementById('opponents').classList.add('active');
  });

  // Start Match Timer
  const startBtn = document.getElementById('startMatch');
  startBtn.addEventListener('click', () => {
    let matchDuration = 360; // 6 minutes example
    startBtn.disabled = true;
    startBtn.textContent = `Ends in ${matchDuration}s`;

    const timer = setInterval(() => {
      matchDuration--;
      if (matchDuration > 0) {
        startBtn.textContent = `Ends in ${matchDuration}s`;
      } else {
        clearInterval(timer);
        startBtn.textContent = `Match Ended`;
      }
    }, 1000);
  });
</script>
