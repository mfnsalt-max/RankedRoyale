<script>
  const root = document.documentElement;

  // Load saved colors
  const accentInput = document.getElementById('accentColor');
  const bgInput = document.getElementById('bgColor');
  const surfaceInput = document.getElementById('surfaceColor');
  const textInput = document.getElementById('textColor');

  const savedColors = JSON.parse(localStorage.getItem('siteColors'));
  if(savedColors){
    root.style.setProperty('--accent', savedColors.accent);
    root.style.setProperty('--bg', savedColors.bg);
    root.style.setProperty('--surface', savedColors.surface);
    root.style.setProperty('--text', savedColors.text);
    accentInput.value = savedColors.accent;
    bgInput.value = savedColors.bg;
    surfaceInput.value = savedColors.surface;
    textInput.value = savedColors.text;
  }

  function saveColors(){
    const colors = {
      accent: accentInput.value,
      bg: bgInput.value,
      surface: surfaceInput.value,
      text: textInput.value
    };
    localStorage.setItem('siteColors', JSON.stringify(colors));
    root.style.setProperty('--accent', colors.accent);
    root.style.setProperty('--bg', colors.bg);
    root.style.setProperty('--surface', colors.surface);
    root.style.setProperty('--text', colors.text);
  }

  accentInput.addEventListener('input', saveColors);
  bgInput.addEventListener('input', saveColors);
  surfaceInput.addEventListener('input', saveColors);
  textInput.addEventListener('input', saveColors);

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    accentInput.value = '#f6c73b';
    bgInput.value = '#0e0e10';
    surfaceInput.value = '#1a1a1d';
    textInput.value = '#eaeaea';
    saveColors();
  });

  // Notifications (visual only)
  const notificationCheckboxes = [
    'notifyFriends',
    'notifyChallenges',
    'notifyRewards',
    'notifyMessages'
  ];

  notificationCheckboxes.forEach(id => {
    const checkbox = document.getElementById(id);
    const saved = localStorage.getItem(id);
    if(saved !== null) checkbox.checked = saved === 'true';
    checkbox.addEventListener('change', () => {
      localStorage.setItem(id, checkbox.checked);
    });
  });
</script>
<script>
  // Dropdown Menu
  const dropdownToggle = document.querySelector('.dropdown-toggle');
  const dropdownMenu = document.querySelector('.dropdown-menu');

  dropdownToggle.addEventListener('click', function(e) {
    e.preventDefault();
    dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
  });

  window.addEventListener('click', function(e) {
    if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.style.display = 'none';
    }
  });
  
</script>
<script src="theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Dropdown toggle
  const toggle = document.querySelector('.dropdown-toggle');
  const menu = document.querySelector('.dropdown-menu');

  toggle.addEventListener('click', e => {
    e.preventDefault();
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  });

  window.addEventListener('click', e => {
    if (!toggle.contains(e.target) && !menu.contains(e.target)) {
      menu.style.display = 'none';
    }
  });
  
  async function checkNotifications() {
      const supabaseUrl = 'https://bxhxfsfpzbluevvimvyy.supabase.co';
      const supabaseKey = 'sb_publishable_POfMVVd3io00nMXGlRc2eQ_jndDE2oj';
      
      if (window.supabase) {
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // Use getSession for a reliable way to check auth status on page load
        const { data: { session } } = await supabase.auth.getSession();
        const user = session?.user;
        
        if (user) {
          // Check friendships table for pending requests where you are the receiver
          const { data, error } = await supabase
            .from('friendships')
            .select('id')
            .eq('receiver_id', user.id)
            .eq('status', 'pending');

          const dot = document.getElementById('friend-notification');
          if (dot) {
            dot.style.display = (data && data.length > 0) ? 'block' : 'none';
          }
        }
      }
    }

    // Initialize notification check on load
    window.addEventListener('DOMContentLoaded', checkNotifications);
</script>
