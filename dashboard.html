  <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; font-family: sans-serif;">
    <h1>Welcome, <span id="display-username">Player</span>!</h1>
    
    <div id="stats-card" style="background: #222; padding: 30px; border-radius: 15px; border: 2px solid #444; color: white; text-align: center; width: 300px; margin-bottom: 20px;">
      <p style="margin: 5px 0; color: #aaa;">PLAYER TAG</p>
      <h2 id="display-tag" style="margin: 0 0 20px 0; letter-spacing: 2px;">#XXXXXX</h2>
      
      <p style="margin: 5px 0; color: #aaa;">CURRENT RANK</p>
      <h2 id="display-elo" style="margin: 0; color: #4A90E2;">1000 ELO</h2>
    </div>

    <!-- The Queue Button -->
    <button id="queue-btn" class="btn-primary" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: #4A90E2; color: white; transition: 0.3s;">
      FIND MATCH
    </button>
    
    <!-- Match Results Buttons (Hidden by default) -->
    <div id="match-actions" style="display: none; flex-direction: column; align-items: center; gap: 15px; margin-top: 15px;">

        <button id="win-btn" style="background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold;">I Won (+30 ELO)</button>
        <button id="loss-btn" style="background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold;">I Lost (-30 ELO)</button>
      </div>
    </div>
    
    <p id="queue-status" style="margin-top: 15px; color: #777; font-style: italic;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    {
      const supabaseUrl = 'https://bxhxfsfpzbluevvimvyy.supabase.co';
      const supabaseKey = 'sb_publishable_POfMVVd3io00nMXGlRc2eQ_jndDE2oj';
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      const displayUsername = document.getElementById('display-username');
      const displayTag = document.getElementById('display-tag');
      const displayElo = document.getElementById('display-elo');
      
      const queueBtn = document.getElementById('queue-btn');
      const queueStatus = document.getElementById('queue-status');
      
      // Match Actions Elements
      const matchActions = document.getElementById('match-actions');
      const winBtn = document.getElementById('win-btn');
      const lossBtn = document.getElementById('loss-btn');

      let currentUser = null;

      // 1. INITIAL LOAD: Get User Data
      async function init() {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
          try {
            window.location.href = 'index.html';
          } catch (error) {
            console.error("Navigation error blocked by sandbox:", error);
            document.body.innerHTML = `
              <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; font-family: sans-serif;">
                <h2>Authentication Required</h2>
                <p style="color: #aaa;">Please open <b>index.html</b> to sign in.</p>
              </div>`;
          }
          return;
        }

        currentUser = user;

        // CLEANUP: Remove user from queue if they refreshed the page as a fail-safe
        await supabase.from('queue').delete().eq('id', currentUser.id);

        const { data: profile } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', user.id)
          .single();

        if (profile) {
          displayUsername.innerText = profile.username || 'Player';
          displayTag.innerText = profile.player_tag;
          displayElo.innerText = (profile.elo_rating || 1000) + " ELO";
        }
      }

      // 2. QUEUE LOGIC: Join the waiting list
      queueBtn.addEventListener('click', async () => {
        queueBtn.disabled = true;
        queueBtn.innerText = "ENTERING QUEUE...";
        matchActions.style.display = 'none'; // Ensure action buttons are hidden when queueing

        const { data: profile } = await supabase
          .from('profiles')
          .select('player_tag, elo_rating')
          .eq('id', currentUser.id)
          .single();

        const { error } = await supabase
          .from('queue')
          .insert([
            { 
              id: currentUser.id, 
              player_tag: profile.player_tag, 
              elo_rating: profile.elo_rating || 1000 
            }
          ]);

        if (error) {
          if (error.code === '23505') { // Unique violation
            alert("You are already in queue!");
            queueBtn.innerText = "SEARCHING...";
            startRealtimeListener(); // Force start listening if they were already in queue
          } else {
            alert("Queue Error: " + error.message);
            queueBtn.disabled = false;
            queueBtn.innerText = "FIND MATCH";
          }
        } else {
          queueBtn.innerText = "SEARCHING...";
          queueBtn.style.background = "#f39c12";
          queueStatus.innerText = "Waiting for an opponent...";
          startRealtimeListener();
        }
      });

      // 3. REALTIME LOGIC: Listen for matches
      function startRealtimeListener() {
        console.log("Starting Realtime Listener...");
        
        // Listen explicitly for INSERT (someone joins) and DELETE (queue clears)
        supabase
          .channel('queue_channel')
          .on(
            'postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'queue' }, 
            (payload) => {
              console.log('Someone joined the queue!', payload);
              checkQueue();
            }
          )
          .on(
            'postgres_changes', 
            { event: 'DELETE', schema: 'public', table: 'queue' }, 
            (payload) => {
              console.log('Queue was cleared.', payload);
              checkQueue();
            }
          )
          .subscribe((status) => {
            console.log("Subscription status:", status);
            if (status === 'SUBSCRIBED') {
              queueStatus.innerText = "Connected to Matchmaker. Waiting...";
            }
          });
          
        // Run initial check immediately
        checkQueue();
      }

      async function checkQueue() {
        console.log("Checking the queue list...");
        const { data: players } = await supabase
          .from('queue')
          .select('*')
          .order('joined_at', { ascending: true });

        console.log("Total players currently in queue:", players);

        if (players && players.length >= 2) {
          const p1 = players[0];
          const p2 = players[1];

          // If YOU are one of the first two people, a match is made!
          if (currentUser.id === p1.id || currentUser.id === p2.id) {
            console.log("Match conditions met!");
            
            // Figure out who the opponent is
            const opponent = currentUser.id === p1.id ? p2 : p1;
            
            alert(`MATCH FOUND: You are playing against ${opponent.player_tag}`);
            queueStatus.innerText = `Match in progress vs ${opponent.player_tag}...`;
            
            // Swap out the Queue Button for the Win/Loss Action Buttons
            queueBtn.style.display = 'none';
            matchActions.style.display = 'flex';

            // IMPORTANT: Remove yourself from the queue so you aren't a "ghost" for the next person.
            setTimeout(async () => {
              await supabase.from('queue').delete().eq('id', currentUser.id);
            }, 3000);
          }
        }
      }

      // 4. ELO REPORTING LOGIC: Update the Database
      async function reportMatch(eloChange) {
        // Disable buttons while updating
        winBtn.disabled = true;
        lossBtn.disabled = true;
        queueStatus.innerText = "Updating ELO...";

        try {
          // Fetch the latest profile to make sure we don't overwrite current ELO accidentally
          const { data: profile } = await supabase
            .from('profiles')
            .select('elo_rating')
            .eq('id', currentUser.id)
            .single();
            
          const currentElo = profile.elo_rating || 1000;
          const newElo = currentElo + eloChange;

          // Push the new ELO to the database
          const { error } = await supabase
            .from('profiles')
            .update({ elo_rating: newElo })
            .eq('id', currentUser.id);

          if (error) throw error;

          alert(`Match result saved! Your ELO changed by ${eloChange}. New ELO: ${newElo}`);
          
          // Reset UI back to default
          matchActions.style.display = 'none';
          queueBtn.style.display = 'block';
          queueBtn.disabled = false;
          queueBtn.innerText = "FIND MATCH";
          queueBtn.style.background = "#4A90E2";
          queueStatus.innerText = "";
          
          // Re-enable buttons for next match
          winBtn.disabled = false;
          lossBtn.disabled = false;

          // Refresh the page data to show the new ELO
          init();

        } catch (err) {
          console.error("Error updating ELO:", err);
          alert("Failed to update ELO: " + err.message);
          winBtn.disabled = false;
          lossBtn.disabled = false;
          queueStatus.innerText = "Failed to update.";
        }
      }

      // Attach event listeners to the Win/Loss buttons
      winBtn.addEventListener('click', () => reportMatch(30));
      lossBtn.addEventListener('click', () => reportMatch(-30));

      // Logout function
      document.getElementById('logout-btn').addEventListener('click', async () => {
        if (currentUser) {
          // CLEANUP: Remove from queue when logging out
          await supabase.from('queue').delete().eq('id', currentUser.id);
        }
        await supabase.auth.signOut();
        try {
          window.location.href = 'index.html';
        } catch (error) {
          console.error("Navigation error blocked by sandbox:", error);
          document.body.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; font-family: sans-serif;">
              <h2>Logged Out Successfully</h2>
              <p style="color: #aaa;">Please open <b>index.html</b> to sign back in.</p>
            </div>`;
        }
      });

      init();
    }
  </script>
