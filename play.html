<style>
  body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
    transition: var(--transition);
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    padding: 40px 20px;
  }

  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transition: all 0.8s ease;
  }

  .player {
    transform: translateX(-100%);
  }

  .opponent {
    transform: translateX(100%);
  }

  .profile-section.active {
    transform: translateX(0);
    opacity: 1;
  }

  .profile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    padding: 12px 16px;
    border-radius: var(--radius);
    min-width: 180px;
  }

  .profile-name {
    font-weight: bold;
    font-size: 1.1rem;
  }

  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-weight: bold;
  }

  .start-btn {
    padding: 14px 28px;
    font-size: 1.2rem;
    background: var(--accent);
    color: var(--surface);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--transition);
  }

  .start-btn:hover {
    opacity: 0.9;
  }

  h1 {
    text-align: center;
  }
</style>
</head>

<script src="theme.js"></script>
<script>
  // Dropdown toggle
  const toggle = document.querySelector('.dropdown-toggle');
  const menu = document.querySelector('.dropdown-menu');
  toggle.addEventListener('click', e => {
    e.preventDefault();
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
  });
  window.addEventListener('click', e => {
    if (!toggle.contains(e.target) && !menu.contains(e.target)) menu.style.display = 'none';
  });

  // Slide-in animation
  window.addEventListener('load', () => {
    document.getElementById('player').classList.add('active');
    document.getElementById('opponent').classList.add('active');
  });

  
</script>



<script>
  const startBtn = document.getElementById('startMatch');

  startBtn.addEventListener('click', () => {
    let matchDuration = 360; // example: 10 seconds match duration
    startBtn.disabled = true; // prevent multiple clicks
    startBtn.textContent = `Ends in ${matchDuration}s`;

    const timer = setInterval(() => {
      matchDuration--;
      if (matchDuration > 0) {
        startBtn.textContent = `Ends in ${matchDuration}s`;
      } else {
        clearInterval(timer);
        startBtn.textContent = `Match Ended`;
        // Re-enable if you want: startBtn.disabled = false;
      }
    }, 1000);
  });
</script>
